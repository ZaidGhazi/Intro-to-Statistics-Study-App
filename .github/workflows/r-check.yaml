name: R checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'

      - name: Run setup check
        shell: Rscript {0}
        run: |
          source("R/check_setup.R")
          result <- check_setup()
          if (!isTRUE(result$ok_to_launch)) quit(status = 1)

      - name: Run smoke test
        shell: Rscript {0}
        run: |
          source("R/smoke_test.R")
          result <- run_smoke_test(run_vitals = FALSE)
          if (isFALSE(result)) quit(status = 1)
