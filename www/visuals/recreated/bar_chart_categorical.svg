<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Recreated Bar Chart</title>
  <desc id="desc">A simple bar chart for categorical data with three categories.</desc>
  <rect width="720" height="420" fill="#ffffff"/>
  <line x1="90" y1="340" x2="650" y2="340" stroke="#1f2937" stroke-width="3"/>
  <line x1="90" y1="60" x2="90" y2="340" stroke="#1f2937" stroke-width="3"/>
  <rect x="150" y="150" width="90" height="190" fill="#4f7dbd"/>
  <rect x="315" y="95" width="90" height="245" fill="#74a57f"/>
  <rect x="480" y="205" width="90" height="135" fill="#d08c60"/>
  <text x="195" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">A</text>
  <text x="360" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">B</text>
  <text x="525" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">C</text>
  <text x="360" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Bar chart: categories on the x-axis</text>
  <text x="40" y="210" transform="rotate(-90 40 210)" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#374151">Count</text>
</svg>
